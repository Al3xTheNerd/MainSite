{% set fixed_height = false %}
{% set show_alerts = true %}
{% extends "core_layout.html" %}
{% block content %}
<div class="row gx-3 gy-3 mb-3">
    <div class="col-12">
        <div class="card text-white bg-dark">
            <div class="card-body">
                <h4 class="card-title">Manage Users</h4>
            </div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item mc-gold bg-dark">This page is used to check/set the permissions of a user.
                </li>
            </ul>
        </div>
    </div>
</div>
<div class="row gx-3 gy-3">
    <div class="col-xs-12 col-sm-12 col-md-6 col-lg-4 col-xl-4 col-xxl-3">
        <div class="card h-100 text-white bg-dark border-white">
            <h3 class="card-header border-white">Permission Level Selector</h3>
            <div class="card-body weird-margins" id="colorsContainer">
                <form method="post">
                    <div class="input-group">
                        <label class="input-group-text">Username</label>
                        <input type="text" class="form-control" placeholder="{{user.username}}" name="username">
                    </div>
                    <div class="input-group mt-3">
                        <label class="input-group-text">Level</label>
                        <select class="form-select" id="permSelection" name="level">
                            <option value="0">Unverified</option>
                            <option value="10">Verified</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-danger mt-3">
                        Update Perms
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
